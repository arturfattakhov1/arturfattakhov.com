settings:
  hide: true
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "content(cms): create {path}"
      update: "content(cms): update {path}"
      delete: "content(cms): delete {path}"
      rename: "content(cms): rename {oldPath} to {newPath}"

content:
  - name: knowledge
    label: Knowledge Base
    type: collection
    path: src/content/knowledge
    format: yaml-frontmatter
    subfolders: false
    filename:
      template: "{translationKey}-{lang}.md"
      field: false
    operations:
      create: true
      rename: false
      delete: false
    view:
      fields: [title, lang, status, date]
      primary: title
      sort: [date, title]
      search: [title, excerpt, translationKey]
      default:
        sort: date
        order: desc
    fields:
      - name: translationKey
        label: Translation key
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          message: "Use lowercase Latin letters, digits, and hyphens."
        description: "Use the same key for the Russian and English versions."
      - name: lang
        label: Language
        type: select
        required: true
        options:
          values:
            - name: ru
              label: Russian
            - name: en
              label: English
      - name: routeSlug
        label: URL slug
        type: string
        required: true
        pattern:
          regex: "^[a-z0-9]+(?:-[a-z0-9]+)*$"
          message: "Use lowercase Latin letters, digits, and hyphens."
        description: "Changing this value changes the article URL."
      - name: title
        label: Title
        type: string
        required: true
        options:
          minlength: 5
          maxlength: 120
      - name: excerpt
        label: Excerpt
        type: text
        required: true
        options:
          minlength: 20
          maxlength: 320
      - name: category
        label: Category
        type: string
        required: true
        options:
          minlength: 3
          maxlength: 80
      - name: date
        label: Publication date
        type: date
        required: true
        options:
          format: "yyyy-MM-dd"
      - name: seoTitle
        label: SEO title
        type: string
        required: true
        options:
          minlength: 5
          maxlength: 70
      - name: metaDescription
        label: Meta description
        type: text
        required: true
        options:
          minlength: 40
          maxlength: 160
      - name: status
        label: Publication status
        type: select
        required: true
        default: draft
        options:
          values:
            - name: draft
              label: Draft
            - name: published
              label: Published
        description: "Keep Draft until editorial and medical review is complete."
      - name: featured
        label: false
        type: boolean
        hidden: true
        default: false
      - name: relatedMedia
        label: false
        type: object
        hidden: true
        default: []
        list: true
        fields:
          - name: title
            type: string
            required: true
          - name: url
            type: string
            required: true
      - name: relatedVideo
        label: false
        type: object
        hidden: true
        default: []
        list: true
        fields:
          - name: title
            type: string
            required: true
          - name: url
            type: string
            required: true
      - name: relatedPodcast
        label: false
        type: object
        hidden: true
        default: []
        list: true
        fields:
          - name: title
            type: string
            required: true
          - name: url
            type: string
            required: true
      - name: body
        label: Article body
        type: rich-text
        required: true
        options:
          format: markdown
          media: false
          switcher: true

  - name: homepage-help
    label: "Homepage: How I can help"
    type: file
    path: src/data/cms/home-help.json
    format: json
    operations:
      create: false
      rename: false
      delete: false
    fields:
      - name: ru
        label: Russian
        type: object
        required: true
        fields:
          - name: title
            label: Section title
            type: string
            required: true
            options:
              minlength: 5
              maxlength: 80
          - name: introduction
            label: Introduction
            type: text
            required: true
            options:
              minlength: 20
              maxlength: 320
          - name: items
            label: Service summaries
            type: object
            required: true
            list:
              min: 3
              max: 3
              collapsible:
                collapsed: false
                summary: "{title}"
            fields:
              - name: title
                label: Title
                type: string
                required: true
                options:
                  minlength: 3
                  maxlength: 80
              - name: description
                label: Description
                type: text
                required: true
                options:
                  minlength: 20
                  maxlength: 240
          - name: practiceCta
            label: Practice link label
            type: string
            required: true
            options:
              minlength: 3
              maxlength: 60
          - name: contactCta
            label: Contact link label
            type: string
            required: true
            options:
              minlength: 3
              maxlength: 60
      - name: en
        label: English
        type: object
        required: true
        fields:
          - name: title
            label: Section title
            type: string
            required: true
            options:
              minlength: 5
              maxlength: 80
          - name: introduction
            label: Introduction
            type: text
            required: true
            options:
              minlength: 20
              maxlength: 320
          - name: items
            label: Service summaries
            type: object
            required: true
            list:
              min: 3
              max: 3
              collapsible:
                collapsed: false
                summary: "{title}"
            fields:
              - name: title
                label: Title
                type: string
                required: true
                options:
                  minlength: 3
                  maxlength: 80
              - name: description
                label: Description
                type: text
                required: true
                options:
                  minlength: 20
                  maxlength: 240
          - name: practiceCta
            label: Practice link label
            type: string
            required: true
            options:
              minlength: 3
              maxlength: 60
          - name: contactCta
            label: Contact link label
            type: string
            required: true
            options:
              minlength: 3
              maxlength: 60

  - name: media-records
    label: Media records
    type: file
    path: src/data/cms/media.json
    format: json
    operations:
      create: false
      rename: false
      delete: false
    fields:
      - name: records
        label: Media records
        type: object
        required: true
        list:
          min: 1
          max: 50
          collapsible:
            collapsed: true
            summary: "{title.en} — {status}"
        fields:
          - name: id
            label: false
            type: uuid
            hidden: true
            required: true
            options:
              editable: false
          - name: type
            label: Record type
            type: select
            required: true
            default: interview
            options:
              values:
                - name: interview
                  label: Interview
                - name: project
                  label: Project
                - name: video
                  label: Video channel
                - name: article
                  label: Article channel
                - name: podcast
                  label: Podcast
          - name: status
            label: Publication status
            type: select
            required: true
            default: draft
            options:
              values:
                - name: draft
                  label: Draft
                - name: published
                  label: Published
          - name: order
            label: Display order
            type: number
            required: true
            default: 100
            options:
              min: 1
              max: 999
          - name: title
            label: Title
            type: object
            required: true
            fields:
              - name: ru
                label: Russian title
                type: string
                required: true
                options:
                  minlength: 3
                  maxlength: 160
              - name: en
                label: English title
                type: string
                required: true
                options:
                  minlength: 3
                  maxlength: 160
          - name: summary
            label: Summary
            type: object
            required: true
            fields:
              - name: ru
                label: Russian summary
                type: text
                required: true
                options:
                  minlength: 20
                  maxlength: 700
              - name: en
                label: English summary
                type: text
                required: true
                options:
                  minlength: 20
                  maxlength: 700
          - name: role
            label: false
            type: object
            hidden: true
            fields:
              - name: ru
                type: text
                required: true
              - name: en
                type: text
                required: true
          - name: externalLinks
            label: External links
            type: object
            required: true
            list:
              min: 1
              max: 5
              collapsible:
                collapsed: true
                summary: "{source.en}"
            fields:
              - name: source
                label: Source
                type: object
                required: true
                fields:
                  - name: ru
                    label: Russian source label
                    type: string
                    required: true
                    options:
                      minlength: 2
                      maxlength: 100
                  - name: en
                    label: English source label
                    type: string
                    required: true
                    options:
                      minlength: 2
                      maxlength: 100
              - name: url
                label: External URL
                type: string
                required: true
                pattern:
                  regex: "^https://[^\\s]+$"
                  message: "Use a complete HTTPS URL."

  - name: profiles
    label: Profiles
    type: file
    path: src/data/cms/profiles.json
    format: json
    operations:
      create: false
      rename: false
      delete: false
    fields:
      - name: profiles
        label: Supported profiles
        type: object
        required: true
        list:
          min: 11
          max: 11
          collapsible:
            collapsed: true
            summary: "{name}"
        fields:
          - name: key
            label: Platform type
            type: select
            readonly: true
            required: true
            options:
              values:
                - orcid
                - googleScholar
                - researchGate
                - webOfScience
                - github
                - instagram
                - threads
                - youtube
                - dzen
                - spotify
                - facebook
          - name: name
            label: Platform name
            type: string
            readonly: true
            required: true
          - name: url
            label: Profile URL
            type: string
            required: true
            pattern:
              regex: "^https://[^\\s]+$"
              message: "Use a complete HTTPS URL."
          - name: order
            label: Display order
            type: number
            required: true
            options:
              min: 1
              max: 999
          - name: active
            label: Active
            type: boolean
            required: true

  - name: homepage-materials
    label: "Homepage: Featured publications"
    type: file
    path: src/data/cms/home-materials.json
    format: json
    operations:
      create: false
      rename: false
      delete: false
    fields:
      - name: featuredPublicationSlugs
        label: Existing publications
        type: select
        required: true
        description: "Choose one to three existing verified publications. Their RU/EN titles come from the publication catalogue."
        options:
          multiple: true
          min: 1
          max: 3
          values:
            - name: comparative-xray-morphometry-moose-cattle
              label: Comparative X-ray morphometry of moose and cattle
            - name: hoof-capsule-cattle-moose
              label: Micromorphological characteristics of the hoof capsule
            - name: diagnostic-imaging-distal-limb-cattle
              label: Diagnostic imaging of distal limb disorders in cattle
            - name: distal-limb-disorders-cattle
              label: Structure of distal limb disorders in cattle
            - name: digitalization-cattle-farming
              label: Digitalization of cattle farming
            - name: ovariectomy-ovariohysterectomy-cats
              label: Ovariectomy and ovariohysterectomy in cats
            - name: feline-calicivirus-saint-petersburg
              label: Feline calicivirus prevalence in Saint Petersburg
            - name: urethral-intussusception-cat
              label: Urethral intussusception in a cat
            - name: xray-morphometric-laminitis-cattle-patent
              label: X-ray morphometric diagnosis of laminitis in cattle
